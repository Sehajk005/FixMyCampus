name: CI — Fix My Campus

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel stale runs on the same branch/PR to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions — each job elevates only what it needs
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────
# REUSABLE ENVIRONMENT DEFAULTS
# ─────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1 — BACKEND
  # Lint → Security Audit → Unit Tests
  # Uses SQLite in-memory (NODE_ENV=test) — no MySQL service needed
  # ───────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Audit & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Security audit
        working-directory: backend
        # Fail on high/critical CVEs; moderate and below are informational
        run: npm audit --audit-level=high

      - name: Run unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci
          REFRESH_TOKEN_SECRET: test-refresh-secret-ci
          PORT: 5001
        # Generate coverage so the report artifact is always available
        run: npm test -- --coverage --forceExit

      - name: Upload backend coverage report
        # Upload even if tests fail so coverage is always inspectable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # JOB 2 — FRONTEND
  # Lint → Security Audit → Unit Tests → Production Build
  # ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Audit, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Run unit tests
        working-directory: frontend
        # --run   → exits after one pass (no watch mode) — required in CI
        # --reporter=verbose → richer output in the Actions log
        run: npm test -- --run --reporter=verbose --coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Build (production)
        working-directory: frontend
        env:
          NODE_ENV: production
          VITE_API_URL: http://localhost:5000
          VITE_SOCKET_URL: http://localhost:5000
          # ── Firebase ──────────────────────────────────────────────
          # Real values come from GitHub repo secrets.
          # Shell-level fallback keeps fork PRs / secret-less runs from
          # crashing the Vite build; the app simply won't authenticate.
          # Note: || in ${{ }} is unreliable for empty secrets —
          #       the shell fallback below is the correct pattern.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        # Apply ci-placeholder at the shell level — reliable for empty/unset secrets
        run: |
          export VITE_FIREBASE_API_KEY="${VITE_FIREBASE_API_KEY:-ci-placeholder}"
          export VITE_FIREBASE_AUTH_DOMAIN="${VITE_FIREBASE_AUTH_DOMAIN:-ci-placeholder}"
          export VITE_FIREBASE_DATABASE_URL="${VITE_FIREBASE_DATABASE_URL:-ci-placeholder}"
          export VITE_FIREBASE_PROJECT_ID="${VITE_FIREBASE_PROJECT_ID:-ci-placeholder}"
          export VITE_FIREBASE_STORAGE_BUCKET="${VITE_FIREBASE_STORAGE_BUCKET:-ci-placeholder}"
          export VITE_FIREBASE_MESSAGING_SENDER_ID="${VITE_FIREBASE_MESSAGING_SENDER_ID:-ci-placeholder}"
          export VITE_FIREBASE_APP_ID="${VITE_FIREBASE_APP_ID:-ci-placeholder}"
          npm run build

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          # Vite outputs to dist/ by default; adjust if your config differs
          path: frontend/dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # JOB 3 — INTEGRATION
  # Runs only after both backend and frontend jobs pass.
  # Installs both sides, starts the backend server, then runs
  # the full integration suite from the repo root.
  # ───────────────────────────────────────────────────────────
  integration:
    name: Integration — Full App Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
  
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
  
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
  
      - name: Run integration tests
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci
          REFRESH_TOKEN_SECRET: test-refresh-secret-ci
          PORT: 5001
          DB_DIALECT: sqlite
        # Runs: node tests/run-integration-tests.mjs from repo root
        run: node tests/run-integration-tests.mjs
  
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/test-results/
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # JOB 4 — CI GATE
  # A single required status check for branch-protection rules.
  # Mark only THIS job as required in GitHub settings so you
  # never have to update the branch-protection list when you
  # add or rename individual jobs.
  # ───────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate — All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration]
    # Run gate even if earlier jobs fail so the status always resolves
    if: always()
    timeout-minutes: 5

    steps:
      - name: Evaluate job results
        # Fails the gate (and therefore the PR) if any upstream job failed
        # or was cancelled. Skipped jobs are treated as passing.
        run: |
          echo "Backend   : ${{ needs.backend.result }}"
          echo "Frontend  : ${{ needs.frontend.result }}"
          echo "Integration: ${{ needs.integration.result }}"

          if [[ "${{ needs.backend.result }}"     == "failure" ||
                "${{ needs.backend.result }}"     == "cancelled" ||
                "${{ needs.frontend.result }}"    == "failure" ||
                "${{ needs.frontend.result }}"    == "cancelled" ||
                "${{ needs.integration.result }}" == "failure" ||
                "${{ needs.integration.result }}" == "cancelled" ]]; then
            echo "❌ One or more jobs failed. Blocking merge."
            exit 1
          fi

          echo "✅ All jobs passed. Safe to merge."